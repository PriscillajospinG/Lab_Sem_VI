name: ML Continuous Delivery Pipeline

on:
  push:
    branches: [main]

jobs:
  build-test-train-deploy-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

      - name: Train model
        run: python train_model.py

      - name: Verify model.pkl exists
        run: |
          test -f model.pkl
          echo "model.pkl found"

      - name: FastAPI syntax check
        run: python -m py_compile app.py

      - name: Mark pipeline success
        run: echo "Pipeline finished successfully"
